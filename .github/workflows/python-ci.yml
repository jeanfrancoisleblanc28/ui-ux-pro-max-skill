name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint — fail on syntax errors and undefined names
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,node_modules,cli/node_modules,cli/assets

      - name: Lint — warnings only (non-blocking)
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
            --statistics --exclude=.git,node_modules,cli/node_modules,cli/assets

      - name: Run pytest
        run: |
          pytest .claude/skills/ui-styling/scripts/tests -v
